document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

:24px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n          <div style=\"font-size:15px; color:rgba(0,0,0,.82);\">SSO ID<\u002Fdiv>\n          <div style=\"display:flex; align-items:center; gap:14px;\">\n            <div style=\"width:300px; background:#F4F4F4; border:1px solid #EDEDED; border-radius:4px; padding:11px 14px; color:rgba(0,0,0,.4); font-size:15px;\">N/A<\u002Fdiv>\n            <button style=\"display:inline-flex; align-items:center; gap:6px; background:#fff; border:1px solid #D7D5D5; border-radius:4px; padding:9px 18px; font-size:14px; font-weight:600; color:rgba(0,0,0,.78); cursor:pointer;\"><span style=\"font-size:18px; line-height:1; margin-top:-2px;\">+<\u002Fspan> Add<\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:grid; grid-template-columns:230px 1fr; align-items:center; gap:24px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n          <div style=\"font-size:15px; color:rgba(0,0,0,.82);\">Title*<\u002Fdiv>\n          <input type=\"text\" placeholder=\"Title\" value=\"{{ vals.title }}\" oninput=\"{{ on.title }}\" style=\"width:100%; border:none; outline:none; background:transparent; font-family:inherit; font-size:15px; color:rgba(0,0,0,.82); padding:4px 0;\">\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:230px 1fr; align-items:center; gap:24px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n          <div style=\"font-size:15px; color:rgba(0,0,0,.82);\">First Name*<\u002Fdiv>\n          <input type=\"text\" placeholder=\"First Name\" value=\"{{ vals.first }}\" oninput=\"{{ on.first }}\" style=\"width:100%; border:none; outline:none; background:transparent; font-family:inherit; font-size:15px; color:rgba(0,0,0,.82); padding:4px 0;\">\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:230px 1fr; align-items:center; gap:24px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n          <div style=\"font-siz sparent; font-family:inherit; font-size:15px; color:rgba(0,0,0,.82); padding:4px 0;\">\n            <div style=\"margin-top:6px; font-size:13px; color:rgba(0,0,0,.5); line-height:1.5; max-width:760px;\">This private phone number can be used for multi-factor authentication. Once verified, you can receive login verification codes via SMS.<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:230px 1fr; align-items:center; gap:24px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n          <div style=\"font-size:15px; color:rgba(0,0,0,.82);\">Office Phone Number<\u002Fdiv>\n          <input type=\"text\" placeholder=\"Add Phone Number\" value=\"{{ vals.office }}\" oninput=\"{{ on.office }}\" style=\"width:100%; border:none; outline:none; background:transparent; font-family:inherit; font-size:15px; color:rgba(0,0,0,.82); padding:4px 0;\">\n        <\u002Fdiv>\n        <\u002Fsc-if>\n        <div style=\"display:grid; grid-template-columns:230px 1fr; align-items:center; gap:24px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n          <div style=\"font-size:15px; color:rgba(0,0,0,.82);\">Office Building<\u002Fdiv>\n          <input type=\"text\" placeholder=\"Office Building\" value=\"{{ vals.building }}\" oninput=\"{{ on.building }}\" style=\"width:100%; border:none; outline:none; background:transparent; font-family:inherit; font-size:15px; color:rgba(0,0,0,.82); padding:4px 0;\">\n        <\u002Fdiv>\n        <div style=\"display:grid; grid-template-columns:230px 1fr; align-items:center; gap:24px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n          <div style=\"font-size:15px; color:rgba(0,0,0,.82);\">Office Room<\u002Fdiv>\n          <input type=\"text\" placeholder=\"Office Room\" value=\"{{ vals.room }}\" oninput=\"{{ on.room }}\" style=\"width:100%; border:none; outline:none; background:transparent; font-family:inherit; font-size:15px; color:rgba(0,0,0,.82); padding:4px 0;\">\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 4. SETTINGS (type-specific swap) -->\n    <div style=\"background:#fff; border-radius:6px; box-shadow:0 1px 2px rgba(0,0,0,.05); overflow:hidden;\">\n      <div style=\"padding:24px 32px 18px;\">\n        <div style=\"font-size:22px; font-weight:600; color:rgba(0,0,0,.85);\">Settings<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:14px; color:rgba(0,0,0,.5);\">Options specific to this user type.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:0 32px 10px;\">\n        <sc-if value=\"{{ isPlatform }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:grid; grid-template-columns:230px 1fr; align-items:center; gap:24px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n            <div style=\"font-size:15px; color:rgba(0,0,0,.82);\">Preferred Starting Page<\u002Fdiv>\n            <div style=\"display:inline-flex; align-items:center; gap:10px; cursor:pointer; width:max-content;\"><span style=\"font-size:15px; color:{{ startingColor }};\">{{ starting }}<\u002Fspan><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"rgba(0,0,0,.5)\"><path d=\"M7 10l5 5 5-5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:230px 1fr; align-items:center; gap:24px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n            <div style=\"font-size:15px; color:rgba(0,0,0,.82);\">Primary Team*<\u002Fdiv>\n            <div style=\"display:inline-flex; align-items:center; gap:10px; cursor:pointer; width:max-content;\"><span style=\"font-size:15px; color:{{ teamColor }};\">{{ team }}<\u002Fspan><svg width=\"11\" height=\"11\" viewBox=\"0 0 24 24\" fill=\"rgba(0,0,0,.5)\"><path d=\"M7 10l5 5 5-5z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns:230px 1fr; align-items:flex-start; gap:24px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n            <div style=\"font-size:15px; color:rgba(0,0,0,.82); line-height:1.4;\">Allow Direct Messages from Network Connections?<\u002Fdiv>\n            <div style=\"display:flex; align-items:flex-start; gap:16px;\">\n              <div onclick=\"{{ tAllowDM }}\" style=\"{{ tog.allowDM.trackStyle }} margin-top:1px;\"><div style=\"{{ tog.allowDM.knobStyle }}\"><span style=\"color:{{ tog.allowDM.iconColor }}; font-size:11px; font-weight:700;\">{{ tog.allowDM.icon }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:13px; color:rgba(0,0,0,.55); line-height:1.5; max-width:660px;\">When enabled, Network Connections can start private messenger chats in Conversations, automatically assigning them to you. If disabled, conversations must be assigned manually or via rules.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n        <sc-if value=\"{{ isPortal }}\" hint-placeholder-val=\"{{ true }}\">\n          <div style=\"display:grid; grid-template-columns:230px 1fr; align-items:flex-start; gap:24px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n            <div style=\"font-size:15px; color:rgba(0,0,0,.82); line-height:1.4;\">See All Students<span style=\"display:inline-block; margin-left:8px; padding:2px 8px; border-radius:999px; background:#FCE8E5; color:#C02C00; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; vertical-align:middle;\">New<\u002Fspan><\u002Fdiv>\n            <div style=\"display:flex; align-items:flex-start; gap:16px;\">\n              <div onclick=\"{{ tSeeAll }}\" style=\"{{ tog.seeAll.trackStyle }} margin-top:1px;\"><div style=\"{{ tog.seeAll.knobStyle }}\"><span style=\"color:{{ tog.seeAll.iconColor }}; font-size:11px; font-weight:700;\">{{ tog.seeAll.icon }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n              <div style=\"font-size:13px; color:rgba(0,0,0,.55); line-height:1.5; max-width:660px;\">When enabled, this Portal user can view every student in the Portal — including students not assigned to them — via the All Students tab. Off by default.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- 5. PERMISSION GROUPS (New User only) -->\n    <sc-if value=\"{{ isNew }}\" hint-placeholder-val=\"{{ true }}\">\n    <div style=\"background:#fff; border-radius:6px; box-shadow:0 1px 2px rgba(0,0,0,.05); overflow:hidden;\">\n      <div style=\"padding:24px 32px 18px;\">\n        <div style=\"font-size:22px; font-weight:600; color:rgba(0,0,0,.85);\">Permission Groups<\u002Fdiv>\n        <div style=\"margin-top:6px; font-size:14px; color:rgba(0,0,0,.5);\">Assign the user to one or more groups. Groups determine what actions the user can take.<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"padding:0 32px 22px;\">\n        <div style=\"display:flex; align-items:center; gap:14px; padding:18px 4px; border-top:1px solid #EFEFEF;\">\n          <div onclick=\"{{ tAddPerm }}\" style=\"{{ tog.addPerm.trackStyle }}\"><div style=\"{{ tog.addPerm.knobStyle }}\"><span style=\"color:{{ tog.addPerm.iconColor }}; font-size:11px; font-weight:700;\">{{ tog.addPerm.icon }}<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <span style=\"font-size:15px; color:rgba(0,0,0,.82);\">Add user to permission groups?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <\u002Fsc-if>\n\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1280,&quot;height&quot;:900},&quot;screen&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;new&quot;,&quot;edit&quot;],&quot;default&quot;:&quot;new&quot;,&quot;tsType&quot;:&quot;'new'|'edit'&quot;},&quot;showDemoBar&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    screen: 'new', creationType: 'manual', userType: 'platform',\n    autoGen: true, askChange: true, allowDM: false, seeAll: false, addPerm: false,\n    starting: 'Start', team: 'Select Primary Team',\n    fields: { email: '', title: '', first: '', middle: '', last: '', phone: '', cell: '', office: '', building: '', room: '' }\n  };\n\n  componentDidMount() {\n    if (this.props.screen === 'edit') this.setScreen('edit');\n  }\n\n  setField(k, v) {\n    this.setState(s => ({ fields: { ...s.fields, [k]: v } }));\n  }\n\n  setScreen(sc) {\n    if (sc === 'edit') {\n      this.setState({\n        screen: 'edit', creationType: 'manual', userType: 'platform',\n        fields: { email: 'lchen@elementu.ai', title: 'Professor, Business Analytics', first: 'Laura', middle: '', last: 'Chen', phone: '', cell: '', office: '', building: '', room: '' },\n        team: 'All Users', starting: 'Select Preferred Start Page', allowDM: false, seeAll: false, addPerm: false, autoGen: true, askChange: true\n      });\n    } else {\n      this.setState({\n        screen: 'new', creationType: 'manual', userType: 'platform',\n        fields: { email: '', title: '', first: '', middle: '', last: '', phone: '', cell: '', office: '', building: '', room: '' },\n        team: 'Select Primary Team', starting: 'Start', allowDM: false, seeAll: false, addPerm: false, autoGen: true, askChange: true\n      });\n    }\n  }\n\n  renderVals() {\n    const s = this.state;\n    const ct = s.creationType, ut = s.userType;\n    const ACCENT = '#058CDA';\n\n    const mk = (on) => ({\n      trackStyle: 'position:relative; width:40px; height:22px; border-radius:999px; flex:none; transition:background .15s; cursor:pointer; background:' + (on ? ACCENT : '#C7C7C7') + ';',\n      knobStyle: 'position:absolute; top:2px; left:2px; width:18px; height:18px; border-radius:50%; background:#fff; display:flex; align-items:center; justify-content:center; box-shadow:0 1px 2px rgba(0,0,0,.3); transition:transform .15s; transform:translateX(' + (on ? '18px' : '0px') + ');',\n      icon: on ? '✓' : '–',\n      iconColor: on ? ACCENT : '#9a9a9a'\n    });\n\n    const seg = (active) => {\n      const base = 'appearance:none; cursor:pointer; font-family:inherit; font-size:13px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:9px 22px; border-radius:4px; transition:all .12s; white-space:nowrap;';\n      return base + (active ? 'color:' + ACCENT + '; border:1px solid #5CB3E8; background:#fff;' : 'color:rgba(0,0,0,.5); border:1px solid transparent; background:transparent;');\n    };\n\n    const sseg = (active) => {\n      const base = 'appearance:none; cursor:pointer; font-family:inherit; font-size:12px; font-weight:600; letter-spacing:.06em; text-transform:uppercase; padding:7px 16px; border-radius:4px; transition:all .12s; border:1px solid transparent;';\n      return base + (active ? 'color:#0B0D2D; background:#fff;' : 'color:rgba(255,255,255,.7); background:transparent;');\n    };\n\n    const pwActive = (s.screen === 'new' && ct === 'manual' && !s.autoGen);\n    const pwBox = 'flex:1; display:flex; align-items:center; gap:10px; border-radius:4px; padding:11px 14px;' + (pwActive ? 'background:#fff; border:1px solid #E0E0E0;' : 'background:#F4F4F4; border:1px solid #F0F0F0;');\n\n    const enabled = !(s.screen === 'new' && !s.fields.email.trim());\n    const btnBase = 'border:none; border-radius:4px; padding:10px 24px; font-family:inherit; font-size:14px; font-weight:600; letter-spacing:.03em;';\n    const btnStyle = btnBase + (enabled ? 'background:#058CDA; color:#fff; cursor:pointer;' : 'background:#BDBDBD; color:#fff; cursor:not-allowed;');\n\n    const f = (k) => (e) => this.setField(k, e.target.value);\n\n    return {\n      showDemoBar: this.props.showDemoBar ?? true,\n      pageTitle: s.screen === 'edit' ? 'Edit User' : 'New User',\n      primaryLabel: s.screen === 'edit' ? 'Save' : (ct === 'invite' ? 'Invite' : 'Save'),\n      primaryBtnStyle: btnStyle,\n      showCreationType: s.screen === 'new',\n      setupDesc: s.screen === 'edit' ? 'Change the kind of user this account is.' : 'Choose how this account is created and what kind of user it is.',\n      isNew: s.screen === 'new',\n      isEdit: s.screen === 'edit',\n      showPassword: s.screen === 'new' && ct === 'manual',\n      isPlatform: ut === 'platform',\n      isPortal: ut === 'portal',\n      typeTagLabel: ut === 'platform' ? 'Platform User' : 'Portal User',\n      typeTagColor: ut === 'platform' ? '#006B8A' : '#C02C00',\n      typeTagBg: ut === 'platform' ? '#E5F9FE' : '#FCE8E5',\n      seg: { ctInvite: seg(ct === 'invite'), ctManual: seg(ct === 'manual'), utPlatform: seg(ut === 'platform'), utPortal: seg(ut === 'portal') },\n      screenSeg: { scNew: sseg(s.screen === 'new'), scEdit: sseg(s.screen === 'edit') },\n      tog: { autoGen: mk(s.autoGen), askChange: mk(s.askChange), allowDM: mk(s.allowDM), seeAll: mk(s.seeAll), addPerm: mk(s.addPerm) },\n      vals: s.fields,\n      on: { email: f('email'), title: f('title'), first: f('first'), middle: f('middle'), last: f('last'), phone: f('phone'), cell: f('cell'), office: f('office'), building: f('building'), room: f('room') },\n      starting: s.starting,\n      team: s.team,\n      teamColor: s.team === 'Select Primary Team' ? 'rgba(0,0,0,.45)' : 'rgba(0,0,0,.82)',\n      startingColor: s.starting.indexOf('Select') === 0 ? 'rgba(0,0,0,.45)' : 'rgba(0,0,0,.82)',\n      pwBoxStyle: pwBox,\n      pwDisabled: !pwActive,\n      ctInvite: () => this.setState({ creationType: 'invite' }),\n      ctManual: () => this.setState({ creationType: 'manual' }),\n      utPlatform: () => this.setState({ userType: 'platform' }),\n      utPortal: () => this.setState({ userType: 'portal' }),\n      scNew: () => this.setScreen('new'),\n      scEdit: () => this.setScreen('edit'),\n      tAutoGen: () => this.setState(st => ({ autoGen: !st.autoGen })),\n      tAskChange: () => this.setState(st => ({ askChange: !st.askChange })),\n      tAllowDM: () => this.setState(st => ({ allowDM: !st.allowDM })),\n      tSeeAll: () => this.setState(st => ({ seeAll: !st.seeAll })),\n      tAddPerm: () => this.setState(st => ({ addPerm: !st.addPerm })),\n      closeNoop: () => {}\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
