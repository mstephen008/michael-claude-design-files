<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Prototypes · Michael's Claude Design Files</title>
<style>
  :root{
    --orange:#FE5000; --indigo:#0B0D2D; --muted:#5b6270; --line:#e7e9ee; --canvas:#f6f7f9;
    --font:"Sofia Pro",-apple-system,BlinkMacSystemFont,"Segoe UI",Helvetica,Arial,sans-serif;
  }
  *{box-sizing:border-box;}
  body{margin:0;background:var(--canvas);color:rgba(11,13,45,.88);font-family:var(--font);-webkit-font-smoothing:antialiased;}
  .wrap{max-width:860px;margin:0 auto;padding:56px 28px 96px;}
  .crumb{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--muted);margin-bottom:34px;}
  .crumb a{color:var(--muted);text-decoration:none;}
  .crumb a:hover{color:var(--orange);}
  .crumb .sep{color:#c3c7d0;}
  .crumb .here{color:rgba(11,13,45,.7);font-weight:600;}
  h1{font-size:34px;line-height:1.1;letter-spacing:-.02em;margin:0 0 10px;font-weight:700;}
  .sub{font-size:16px;line-height:1.55;color:var(--muted);margin:0 0 40px;max-width:560px;}
  .grid{display:grid;gap:14px;}
  a.card{display:flex;align-items:center;gap:18px;text-decoration:none;color:inherit;background:#fff;border:1px solid var(--line);border-radius:12px;padding:20px 22px;transition:box-shadow .18s ease,transform .18s ease,border-color .18s ease;}
  a.card:hover{box-shadow:0 6px 22px rgba(11,13,45,.09);transform:translateY(-1px);border-color:#d8dbe2;}
  .ico{width:46px;height:46px;border-radius:10px;background:linear-gradient(135deg,var(--orange),#ff7a3d);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
  .ico svg{width:24px;height:24px;fill:#fff;}
  .meta{flex:1;min-width:0;}
  .meta .t{font-size:17px;font-weight:600;margin-bottom:3px;}
  .meta .d{font-size:14px;line-height:1.45;color:var(--muted);}
  .arrow{color:#b7bcc6;font-size:22px;flex-shrink:0;}
  .foot{margin-top:56px;padding-top:22px;border-top:1px solid var(--line);font-size:13px;color:#9aa0ac;}
</style>
</head>
<body>
  <div class="wrap">
    <div class="crumb"><a href="../">Design Files</a><span class="sep">/</span><span class="here">Prototypes</span></div>
    <h1>Prototypes</h1>
    <p class="sub">Browse by product module.</p>

    <div class="grid">
      <a class="card" href="applications/">
        <div class="ico"><svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8l-6-6zm0 2 4 4h-4V4zM8 13h8v2H8v-2zm0 4h8v2H8v-2zm0-8h4v2H8V9z"/></svg></div>
        <div class="meta">
          <div class="t">Applications</div>
          <div class="d">Mockups and prototypes for the Applications module.</div>
        </div>
        <div class="arrow">→</div>
      </a>
      <a class="card" href="case-management/">
        <div class="ico"><svg viewBox="0 0 24 24"><path d="M10 2h4a2 2 0 0 1 2 2v2h3a2 2 0 0 1 2 2v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h3V4a2 2 0 0 1 2-2zm0 4h4V4h-4v2zm-5 4v9h14v-9h-4v1a1 1 0 0 1-2 0v-1H11v1a1 1 0 0 1-2 0v-1H5z"/></svg></div>
        <div class="meta">
          <div class="t">Case Management</div>
          <div class="d">Mockups and prototypes for the Case Management module.</div>
        </div>
        <div class="arrow">→</div>
      </a>
    </div>

    <div class="foot">Add a new module by dropping a folder with an <code>index.html</code> beside this file.</div>
  </div>
</body>
</html>
